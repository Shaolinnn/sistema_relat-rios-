<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BrandField Reports{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #1a73e8;
      --primary-dark: #0d47a1;
      --accent: #fbbc04;
      --success: #34a853;
      --danger: #ea4335;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text: #202124;
      --text-muted: #5f6368;
      --border: #e8eaed;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .header {
      background: var(--primary);
      color: #fff;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header h1 { font-size: 1.4rem; font-weight: 600; }
    .header .meta { font-size: 0.85rem; opacity: 0.85; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      margin-top: 32px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 24px;
      border-left: 4px solid var(--primary);
    }

    .kpi-card .label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .kpi-card .value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .kpi-card.accent  { border-left-color: var(--accent); }
    .kpi-card.success { border-left-color: var(--success); }
    .kpi-card.danger  { border-left-color: var(--danger); }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
    }

    .chart-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .chart-card h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .chart-container { position: relative; height: 220px; }

    .summary-box {
      background: #e8f5e9;
      border-left: 4px solid var(--success);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 20px 24px;
      font-family: monospace;
      font-size: 0.88rem;
      white-space: pre-line;
      color: var(--text);
      line-height: 1.8;
    }

    .footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 32px 20px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
    }

    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .chart-grid { grid-template-columns: 1fr; }
      .header { padding: 16px 20px; }
    }
  </style>
</head>
<body>
{% block content %}{% endblock %}
<div class="footer">
  Gerado automaticamente em {{ generated_at }} pelo <strong>BrandField Reports</strong>
</div>
</body>
</html>
